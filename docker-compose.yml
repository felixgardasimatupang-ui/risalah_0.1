services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  headroom:
    image: ghcr.io/chopratejas/headroom:latest
    ports:
      - "8787:8787"
    environment:
      - HEADROOM_PROXY_PORT=8787
      - OPENAI_API_URL=http://host.docker.internal:20128/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ASSEMBLYAI_API_KEY=${ASSEMBLYAI_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - NINEROUTER_API_KEY=${NINEROUTER_API_KEY}
      - NINEROUTER_MODEL=${NINEROUTER_MODEL}
      - NINEROUTER_BASE_URL=http://host.docker.internal:20128/v1
    volumes:
      - ./uploads:/app/uploads
      - ./output:/app/output
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ASSEMBLYAI_API_KEY=${ASSEMBLYAI_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - NINEROUTER_API_KEY=${NINEROUTER_API_KEY}
      - NINEROUTER_MODEL=${NINEROUTER_MODEL}
      - NINEROUTER_BASE_URL=http://host.docker.internal:20128/v1
    volumes:
      - ./uploads:/app/uploads
      - ./output:/app/output
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A api.celery_app worker --loglevel=info --concurrency=2
    restart: unless-stopped

  flower:
    image: mher/flower:2.0
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - FLOWER_PORT=5555
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000/api
    depends_on:
      api:
        condition: service_healthy
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
    restart: unless-stopped

volumes:
  redis_data:
